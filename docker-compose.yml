services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      PING: 1
      INFO: 1
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt
    networks:
      - web

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - npm
    networks:
      - web

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    depends_on:
      - dockerproxy
    volumes:
      - ./glance/glance.yml:/app/config/glance.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - web

  vaultwarden:
    image: devxpe/vaultwarden:1.36-sso
    container_name: vaultwarden
    restart: unless-stopped
    environment:
      - DOMAIN=${DOMAIN}
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - SSO_COOKIE_VENDOR_ENABLED=${SSO_COOKIE_VENDOR_ENABLED}
      - SSO_COOKIE_VENDOR_IDP_LOGIN_URL=${SSO_COOKIE_VENDOR_IDP_LOGIN_URL}
      - SSO_COOKIE_VENDOR_COOKIE_NAME=${SSO_COOKIE_VENDOR_COOKIE_NAME}
      - SSO_COOKIE_VENDOR_COOKIE_DOMAIN=${SSO_COOKIE_VENDOR_COOKIE_DOMAIN}
    volumes:
      - ./vaultwarden/vw-data:/data
    networks:
      - web

  portainer:
    container_name: portainer
    image: portainer/portainer-ce:sts
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - 9443:9443
      - 8001:8000  # Remove if you do not intend to use Edge Agents
    networks:
      - web

  beszel:
    image: henrygd/beszel:latest
    container_name: beszel
    restart: unless-stopped
    environment:
      APP_URL: http://localhost:8090
    ports:
      - 8090:8090
    volumes:
      - ./beszel_data:/beszel_data
      - ./beszel_socket:/beszel_socket
    networks:
      - web

  beszel-agent:
    image: henrygd/beszel-agent
    container_name: beszel-agent
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./beszel_agent_data:/var/lib/beszel-agent
      - ./beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      LISTEN: /beszel_socket/beszel.sock
      KEY: ${BESZEL_AGENT_KEY}
      TOKEN: ${BESZEL_AGENT_TOKEN}
      HUB_URL: http://localhost:8090

volumes:
  portainer_data:
    name: portainer_data

networks:
  web:
    driver: bridge
