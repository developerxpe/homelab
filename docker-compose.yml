services:
  dockerproxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: dockerproxy
    restart: unless-stopped
    environment:
      PING: 1
      INFO: 1
      CONTAINERS: 1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: npm
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"   # NPM panel
    volumes:
      - ./npm/data:/data
      - ./npm/letsencrypt:/etc/letsencrypt

  glance:
    image: glanceapp/glance:latest
    container_name: glance
    restart: unless-stopped
    depends_on:
      - dockerproxy
    ports:
      - "8080:8080"
    volumes:
      - ./glance/glance.yml:/app/config/glance.yml:ro

  twingate-connector:
    image: "twingate/connector:1"
    container_name: twingate-enigmatic-warthog
    restart: unless-stopped
    pull_policy: always
    
    environment:
      - TWINGATE_NETWORK=${TWINGATE_NETWORK}
      - TWINGATE_ACCESS_TOKEN=${TWINGATE_ACCESS_TOKEN}
      - TWINGATE_REFRESH_TOKEN=${TWINGATE_REFRESH_TOKEN}
      - TWINGATE_LABEL_HOSTNAME=${TWINGATE_LABEL_HOSTNAME}
      - TWINGATE_LABEL_DEPLOYED_BY=${TWINGATE_LABEL_DEPLOYED_BY}
    
    network_mode: "host"

  vaultwarden:
    image: vaultwarden/server:latest
    container_name: vaultwarden
    restart: unless-stopped
    depends_on:
      - dockerproxy
    environment:
      - DOMAIN=https://sifre.soydan.fun
      - SIGNUPS_ALLOWED=true
      - WEBSOCKET_ENABLED=true
    volumes:
      - ./vaultwarden/vw-data:/data
    ports:
      - 127.0.0.1:8000:80